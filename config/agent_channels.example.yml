default:
  channel: zenmux
  model: anthropic/claude-sonnet-4.6

channels:
  - name: zenmux
    label: Zenmux
    type: zenmux
    api_key_env: ZENMUX_API_KEY
    base_url: https://zenmux.ai/api/v1
    anthropic_base_url: https://zenmux.ai/api/anthropic
    models:
      - id: anthropic/claude-opus-4.8
        provider: anthropic
        label: Claude Opus 4.8
        description: Most capable, highest cost
        tags: [tool-use, reasoning, premium]
      - id: anthropic/claude-sonnet-4.6
        provider: anthropic
        label: Claude Sonnet 4.6
        tags: [tool-use, reasoning]
      - id: anthropic/claude-sonnet-5
        provider: anthropic
        label: Claude Sonnet 5
        tags: [tool-use, reasoning]
      - id: anthropic/claude-haiku-4.5
        provider: anthropic
        label: Claude Haiku 4.5
        tags: [fast]
      - id: openai/gpt-5.5
        provider: openai
        label: GPT-5.5
        tags: [tool-use]
      - id: google/gemini-2.5-pro
        provider: openai
        label: Gemini 2.5 Pro
        tags: [tool-use, reasoning]
      - id: google/gemini-3.1-pro-preview
        provider: openai
        label: Gemini 3.1 Pro
        tags: [tool-use, reasoning]
      # Third-party vendors routed through Zenmux's OpenAI-compatible gateway.
      # provider must be 'openai' (the dispatch SDK label); the real vendor lives
      # in the id. Keep in sync with CANDIDATE_MODELS in services/arena/models.py.
      - id: z-ai/glm-5.2
        provider: openai
        label: GLM 5.2
        tags: [tool-use, reasoning]
      - id: moonshotai/kimi-k2.7-code
        provider: openai
        label: Kimi 2.7
        tags: [tool-use, reasoning]
      - id: minimax/minimax-m3
        provider: openai
        label: MiniMax M3
        tags: [tool-use]
      - id: xiaomi/mimo-v2.5-pro
        provider: openai
        label: MiMo V2.5 Pro
        tags: [tool-use]
      - id: deepseek/deepseek-v4-pro
        provider: openai
        label: DeepSeek V4 Pro
        tags: [tool-use, reasoning]
      - id: qwen/qwen3.7-max
        provider: openai
        label: Qwen 3.7 Max
        tags: [tool-use, reasoning]
      # --- Run #9 flash-tier candidate field (Zenmux OpenAI-compatible) ---
      - id: bytedance/doubao-seed-evolving
        provider: openai
        label: Doubao Seed Evolving
        tags: [fast, tool-use]
      - id: bytedance/doubao-seed-2.1-turbo
        provider: openai
        label: Doubao Seed 2.1 Turbo
        tags: [fast, tool-use]
      - id: qwen/qwen3.7-plus
        provider: openai
        label: Qwen 3.7 Plus
        tags: [fast, tool-use]
      - id: stepfun/step-3.7-flash
        provider: openai
        label: Step 3.7 Flash
        tags: [fast, tool-use]
      - id: sapiens-ai/agnes-2.0-flash
        provider: openai
        label: Agnes 2.0 Flash
        tags: [fast, tool-use]
      - id: google/gemini-3.5-flash
        provider: openai
        label: Gemini 3.5 Flash
        tags: [fast, tool-use]
      - id: openai/chat-latest
        provider: openai
        label: GPT-5.5 Instant
        tags: [fast, tool-use]
      - id: deepseek/deepseek-v4-flash
        provider: openai
        label: DeepSeek V4 Flash
        # 'extractor' pins this as the memory diff-extraction model (cheap, JSON).
        # Routed via Zenmux's OpenAI-compatible gateway, so it shares ZENMUX_API_KEY
        # and needs no langchain-deepseek — unlike the deepseek-channel entry below.
        tags: [fast, tool-use, reasoning, extractor]
      - id: xiaomi/mimo-v2.5
        provider: openai
        label: MiMo V2.5
        tags: [fast, tool-use]
      - id: tencent/hy3-preview
        provider: openai
        label: Hunyuan 3 Preview
        tags: [fast, tool-use]

  - name: deepseek
    label: DeepSeek
    type: openai_compatible
    api_key_env: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com
    models:
      - id: deepseek-v4-flash
        provider: deepseek
        label: DeepSeek V4 Flash
        description: Fast, low-cost reasoning
        tags: [fast, reasoning]
      - id: deepseek-v4-pro
        provider: deepseek
        label: DeepSeek V4 Pro
        description: Higher-capability reasoning tier
        tags: [reasoning]
